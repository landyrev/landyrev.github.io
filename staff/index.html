<!doctype html>

<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>The HTML5 Herald</title>
    <meta name="description" content="The HTML5 Herald">
    <meta name="author" content="SitePoint">
    <style>
        html,
        body {
            height: 100%;
            background-color: cornflowerblue;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: Arial, Helvetica, sans-serif;
            font-weight: 200;
        }
        
        #phoneInput {
            font-size: 18px;
            text-align: center;
            background-color: transparent;
            border: none;
            border-bottom: solid 1px rgba(255, 255, 255, 0.5);
            color: white;
            font-weight: 200;
        }
        #phoneInput:focus {
            outline: none;
            border-bottom-color: white;
        }
        a {
            color: white;
            margin-top: 20px;
            text-decoration: none;
            text-transform: uppercase;
            text-align: center;
        }
        a:focus {
            opacity: 0.5;
        }
    </style>
</head>

<body>
    <input type="text" pattern="\d*" onclick="selectAll()" onkeyup="genLink()" id="phoneInput" value="+78002000600" autofocus>
    <!--<a href="#" onclick="genLink()">Generate Link</a>-->
    <a href=""  target="_blank" id="callerButton" style="margin-top: 40px">CALL</a>
    <script>
        var inputEl = document.getElementById('phoneInput');
        var callLink = document.getElementById('callerButton');

        function genLink() {
            var phone = inputEl.value;
            callLink.innerHTML = `Call<br>${phone}`;
            callLink.href = `https://staff.yandex-team.ru/api/call/${phone}`;
            console.log(phone);
        }
        function selectAll() {
            inputEl.setSelectionRange(2, inputEl.value.length)
        }
        selectAll();
        genLink();
    </script>
</body>
</html>
